# Build Windows exe for Start.gg VOD Splitter
# Exe is uploaded as an artifact; optionally publish on release.

name: Build Windows exe

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow "Run workflow" from Actions tab

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: pyinstaller --noconfirm StartGG-VOD-Splitter.spec

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: StartGG-VOD-Splitter-Windows
          path: dist/StartGG-VOD-Splitter.exe
